# HTTP-only bootstrap for first Let's Encrypt issuance on this host.
# Certbot HTTP-01 needs :80 to serve the challenge (or nginx plugin needs an HTTP listener).
#
# Install once on the droplet:
#   sudo cp deploy/nginx-portfolio-bootstrap-http80.conf /etc/nginx/sites-available/portfolio-bootstrap.conf
#   sudo ln -sf /etc/nginx/sites-available/portfolio-bootstrap.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then (DNS pointing here): sudo certbot --nginx -d www.payam-dehkordy.com -d payam-dehkordy.com
#
# After certificates exist: disable this bootstrap site, enable canonical deploy/nginx-portfolio.conf
# (GitHub Actions installs that into sites-available/portfolio.conf on each deploy).

server {
    listen 80;
    listen [::]:80;
    server_name www.payam-dehkordy.com payam-dehkordy.com;

    root /var/www/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
