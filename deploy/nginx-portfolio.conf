# Canonical vhost for https://www.payam-dehkordy.com/
#
# Web root on server: /var/www/portfolio (see docs/DROPLET_MIGRATION_ROADMAP.md)
# Install:
#   sudo cp deploy/nginx-portfolio.conf /etc/nginx/sites-available/portfolio.conf
#   sudo ln -sf /etc/nginx/sites-available/portfolio.conf /etc/nginx/sites-enabled/portfolio.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: obtain a single certificate for BOTH names so paths stay consistent:
#   sudo certbot --nginx -d www.payam-dehkordy.com -d payam-dehkordy.com
# Certbot typically stores files under /etc/letsencrypt/live/www.payam-dehkordy.com/
# If your live/ directory name differs, update ssl_certificate paths below to match.

server {
    listen 80;
    listen [::]:80;
    server_name www.payam-dehkordy.com payam-dehkordy.com;
    return 301 https://www.payam-dehkordy.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://www.payam-dehkordy.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
