# Canonical vhost for https://www.payam-dehkordy.com/
#
# Cloudflare: use SSL mode "Full (strict)" when origin has Let's Encrypt.
# "Flexible" + redirect every :80 request to https:// causes an infinite 301 loop
# (Cloudflare keeps calling origin over HTTP). See Droplet docs / PORTFOLIO_HOSTING.md.
#
# Web root on server: /var/www/portfolio
# Mail API: uvicorn on 127.0.0.1:8791 — nginx proxies only on www (apex redirects first).
# TLS paths:
#   /etc/letsencrypt/live/www.payam-dehkordy.com/

server {
    listen 80;
    listen [::]:80;
    server_name www.payam-dehkordy.com payam-dehkordy.com;

    # HTTP-01 renewal may hit http://…/.well-known/… — serve before redirecting /
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/portfolio;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://www.payam-dehkordy.com$request_uri;
    }
}

# Apex HTTPS → canonical www (avoids server-level if() + ensures POST /api/* uses same host as CORS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://www.payam-dehkordy.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8791;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /var/www/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Cache-busted assets (?v=…) are safe to cache long-term; immutable
    # tells browsers to skip revalidation entirely for the full TTL.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
