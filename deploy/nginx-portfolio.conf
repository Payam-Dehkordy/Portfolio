# Canonical vhost for https://www.payam-dehkordy.com/
#
# Cloudflare: use SSL mode "Full (strict)" when origin has Let's Encrypt.
# "Flexible" + redirect every :80 request to https:// causes an infinite 301 loop
# (Cloudflare keeps calling origin over HTTP). See Droplet docs / PORTFOLIO_HOSTING.md.
#
# Web root on server: /var/www/portfolio
# Mail API: uvicorn on 127.0.0.1:8791 — nginx proxies only on www (apex redirects first).
# TLS paths:
#   /etc/letsencrypt/live/www.payam-dehkordy.com/

server {
    listen 80;
    listen [::]:80;
    server_name www.payam-dehkordy.com payam-dehkordy.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/portfolio;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://www.payam-dehkordy.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://www.payam-dehkordy.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # ── Security headers (server-level so all location blocks inherit) ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.calendly.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://assets.calendly.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; frame-src https://calendly.com; connect-src 'self';" always;

    # ── Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8791;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /var/www/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache" always;
    }

    # Portfolio detail previews change independently of hashed JS/CSS — avoid week-long immutable cache.
    location ^~ /assets/images/previews/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }
}
