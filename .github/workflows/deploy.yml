# Only workflow defined in-repo for deploy. If GitHub also runs "pages build and deployment",
# disable Settings → Pages → Source (None) — production is the droplet, not GitHub Pages.
#
# Secrets (repo → Settings → Secrets and variables → Actions):
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY_B64
#   SSH_TARGET_DIR  MUST be /var/www/portfolio (document root only).
# Optional: SSH_PORT (default 22)
#
# Cloudflare cache purge (optional but recommended):
#   CLOUDFLARE_ZONE_ID   — zone id from Cloudflare dashboard → Overview
#   CLOUDFLARE_API_TOKEN  — API token with Zone:Cache Purge:Edit permission
#   When both secrets are set the deploy purges edge cache so visitors see
#   fresh content immediately. Without them the step is skipped gracefully.
#
# Deploy user needs passwordless sudo — install deploy/sudoers-portfolio-deploy.example
# on the droplet (mkdir/chown under /var/www/portfolio + /opt/portfolio-mail + nginx + portfolio-mail systemd).

name: Deploy Portfolio (static)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: portfolio-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key (secret)
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          KEYFILE="$HOME/.ssh/id_ed25519"
          if printf '%s' "$SSH_PRIVATE_KEY_B64" | grep -qE 'BEGIN (OPENSSH|RSA|EC) PRIVATE KEY|BEGIN PRIVATE KEY'; then
            printf '%s' "$SSH_PRIVATE_KEY_B64" > "$KEYFILE"
          else
            printf '%s' "$SSH_PRIVATE_KEY_B64" | tr -d '\r\n\t ' | base64 -d > "$KEYFILE" || {
              echo "::error::Could not decode SSH_PRIVATE_KEY_B64"
              exit 1
            }
          fi
          chmod 600 "$KEYFILE"
          if ! [ -s "$KEYFILE" ]; then
            echo "::error::SSH key file is empty"
            exit 1
          fi
          sed -i 's/\r$//' "$KEYFILE"
          python3 -c "p='$KEYFILE'; d=open(p,'rb').read(); open(p,'wb').write(d[3:] if d.startswith(b'\xef\xbb\xbf') else d)"

          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH login
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" -o BatchMode=yes -o IdentitiesOnly=yes \
            -i ~/.ssh/id_ed25519 \
            "$SSH_USER@$SSH_HOST" "echo ok"

      - name: Rsync static tree + install nginx vhost
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          if [ -z "$SSH_TARGET_DIR" ]; then
            echo "::error::Set SSH_TARGET_DIR to /var/www/portfolio"
            exit 1
          fi
          if [ "$SSH_TARGET_DIR" != "/var/www/portfolio" ]; then
            echo "::error::SSH_TARGET_DIR must be exactly /var/www/portfolio (avoid overwriting another site)"
            exit 1
          fi

          PORT="${SSH_PORT:-22}"
          REMOTE="$SSH_USER@$SSH_HOST:$SSH_TARGET_DIR"
          RSYNC_RSH="ssh -p $PORT -o IdentitiesOnly=yes -i $HOME/.ssh/id_ed25519"
          SSH_BASE=(ssh -p "$PORT" -o IdentitiesOnly=yes -i "$HOME/.ssh/id_ed25519" "$SSH_USER@$SSH_HOST")

          # /var/www/* is root-owned; CI user needs NOPASSWD (deploy/sudoers-portfolio-deploy.example on server).
          "${SSH_BASE[@]}" env REMOTE_USER="$SSH_USER" bash -s <<'ENSURE_WEBROOT'
          set -euo pipefail
          die_sudo() {
            echo "::error::Passwordless sudo is not configured for this user. On the droplet as root: sudo visudo -f /etc/sudoers.d/portfolio-deploy — paste the FULL file from https://github.com/Payam-Dehkordy/Portfolio/blob/main/deploy/sudoers-portfolio-deploy.example If your SSH login is not deploy, replace every leading deploy on sudo lines with your username (must match GitHub SSH_USER). Verify paths: command -v mkdir chown chgrp chmod cp ln nginx systemctl. Then sudo visudo -c."
            exit 1
          }
          sudo -n /usr/bin/mkdir -p /var/www/portfolio 2>/dev/null || sudo -n /bin/mkdir -p /var/www/portfolio 2>/dev/null || die_sudo
          sudo -n /usr/bin/chown -R "$REMOTE_USER" /var/www/portfolio 2>/dev/null || sudo -n /bin/chown -R "$REMOTE_USER" /var/www/portfolio 2>/dev/null || die_sudo
          sudo -n /usr/bin/chgrp -R www-data /var/www/portfolio 2>/dev/null || sudo -n /bin/chgrp -R www-data /var/www/portfolio 2>/dev/null || die_sudo
          sudo -n /usr/bin/chmod -R g+rX /var/www/portfolio 2>/dev/null || sudo -n /bin/chmod -R g+rX /var/www/portfolio 2>/dev/null || die_sudo
          ENSURE_WEBROOT

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".cursor/" \
            --exclude "deploy/" \
            --exclude "docs/" \
            --exclude "README.md" \
            --exclude "mail-service/" \
            -e "$RSYNC_RSH" \
            ./ \
            "$REMOTE/"

          "${SSH_BASE[@]}" "chmod -R a+rX '$SSH_TARGET_DIR'"

          "${SSH_BASE[@]}" env REMOTE_USER="$SSH_USER" bash -s <<'ENSURE_MAILDIR'
          set -euo pipefail
          die_sudo() {
            echo "::error::Passwordless sudo incomplete for mail deploy. Merge latest deploy/sudoers-portfolio-deploy.example into /etc/sudoers.d/portfolio-deploy then sudo visudo -c."
            exit 1
          }
          sudo -n /usr/bin/mkdir -p /opt/portfolio-mail 2>/dev/null || sudo -n /bin/mkdir -p /opt/portfolio-mail 2>/dev/null || die_sudo
          sudo -n /usr/bin/chown -R "$REMOTE_USER" /opt/portfolio-mail 2>/dev/null || sudo -n /bin/chown -R "$REMOTE_USER" /opt/portfolio-mail 2>/dev/null || die_sudo
          ENSURE_MAILDIR

          # Exclude venv: it only exists on the server (--delete would try to remove it; running
          # portfolio-mail holds files open → "cannot delete non-empty directory").
          rsync -az --delete \
            --exclude "venv/" \
            --exclude ".venv/" \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            -e "$RSYNC_RSH" \
            mail-service/ \
            "$SSH_USER@$SSH_HOST:/opt/portfolio-mail/"

          scp -P "$PORT" -o IdentitiesOnly=yes -i "$HOME/.ssh/id_ed25519" \
            mail-service/portfolio-mail.service \
            "$SSH_USER@$SSH_HOST:/tmp/portfolio-mail.service"

          "${SSH_BASE[@]}" bash -s <<'INSTALL_MAIL'
          set -euo pipefail
          if ! [ -x /opt/portfolio-mail/venv/bin/python3 ]; then
            python3 -m venv /opt/portfolio-mail/venv
          fi
          /opt/portfolio-mail/venv/bin/pip install -q -r /opt/portfolio-mail/requirements.txt
          sudo -n /usr/bin/cp /tmp/portfolio-mail.service /etc/systemd/system/portfolio-mail.service \
            || sudo -n /bin/cp /tmp/portfolio-mail.service /etc/systemd/system/portfolio-mail.service
          sudo -n /usr/bin/systemctl daemon-reload || sudo -n /bin/systemctl daemon-reload
          sudo -n /usr/bin/systemctl enable portfolio-mail 2>/dev/null || sudo -n /bin/systemctl enable portfolio-mail 2>/dev/null || true
          sudo -n /usr/bin/systemctl restart portfolio-mail || sudo -n /bin/systemctl restart portfolio-mail
          INSTALL_MAIL

          scp -P "$PORT" -o IdentitiesOnly=yes -i "$HOME/.ssh/id_ed25519" \
            deploy/nginx-portfolio.conf \
            "$SSH_USER@$SSH_HOST:/tmp/portfolio-nginx.conf"

          "${SSH_BASE[@]}" bash -s <<'REMOTE_INSTALL'
          set -euo pipefail
          TMP=/tmp/portfolio-nginx.conf
          CERT=/etc/letsencrypt/live/www.payam-dehkordy.com/fullchain.pem
          # Always install the vhost (includes location /api/ → portfolio-mail). Do not skip when $CERT
          # is missing from this check — that left stale nginx without /api/ and caused POST …/api/mail 405.
          sudo -n /usr/bin/cp "$TMP" /etc/nginx/sites-available/portfolio.conf \
            || sudo -n /bin/cp "$TMP" /etc/nginx/sites-available/portfolio.conf
          sudo -n /usr/bin/ln -sf /etc/nginx/sites-available/portfolio.conf /etc/nginx/sites-enabled/portfolio.conf \
            || sudo -n /bin/ln -sf /etc/nginx/sites-available/portfolio.conf /etc/nginx/sites-enabled/portfolio.conf
          if ! sudo -n /usr/sbin/nginx -t; then
            echo "::error::nginx -t failed. Issue TLS with Certbot so ssl_certificate paths exist (see Droplet PORTFOLIO_HOSTING.md); expected cert: $CERT"
            exit 1
          fi
          sudo -n /usr/bin/systemctl reload nginx \
            || sudo -n /bin/systemctl reload nginx
          REMOTE_INSTALL

      - name: Purge Cloudflare edge cache
        if: ${{ secrets.CLOUDFLARE_ZONE_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' }}
        shell: bash
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/cf_purge.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Cloudflare purge response: HTTP $HTTP_CODE"
          cat /tmp/cf_purge.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Cloudflare cache purge returned HTTP $HTTP_CODE — site may serve stale content"
          fi

      - name: Remote diagnostics (HTTPS → job log)
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          PORT="${SSH_PORT:-22}"
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          ssh -p "$PORT" -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 \
            "$SSH_USER@$SSH_HOST" bash -s <<REMOTE_SCRIPT
          set +e
          echo "::group::HTTPS checks on loopback (Host: www.payam-dehkordy.com)"
          code=\$(curl -sS -o /dev/null -w "%{http_code}" -k --resolve www.payam-dehkordy.com:443:127.0.0.1 "https://www.payam-dehkordy.com/" 2>/dev/null || echo "fail")
          echo "GET https://www.payam-dehkordy.com/ → HTTP \${code}"
          code_services=\$(curl -sS -o /dev/null -w "%{http_code}" -k --resolve www.payam-dehkordy.com:443:127.0.0.1 "https://www.payam-dehkordy.com/services/qa-retainer.html" 2>/dev/null || echo "fail")
          echo "GET /services/qa-retainer.html → HTTP \${code_services}"
          code_health=\$(curl -sS -o /dev/null -w "%{http_code}" "http://127.0.0.1:8791/health" 2>/dev/null || echo "fail")
          echo "GET http://127.0.0.1:8791/health (portfolio-mail) → HTTP \${code_health}"
          echo "::endgroup::"
          echo "::group::document root"
          ls -la /var/www/portfolio 2>/dev/null | head -20 || echo "missing /var/www/portfolio"
          test -f /var/www/portfolio/index.html && wc -c /var/www/portfolio/index.html || echo "no index.html"
          echo "::endgroup::"
          echo "::group::content freshness"
          echo "Expected commit: $COMMIT_SHORT"
          echo "Cache buster in deployed index.html:"
          grep -oP '(styles|script)\.(css|js)\?v=[^"]+' /var/www/portfolio/index.html 2>/dev/null || echo "(no cache busters found)"
          echo "::endgroup::"
          REMOTE_SCRIPT
